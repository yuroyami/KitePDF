name: CI

# Build + test gate. The JVM target is the canonical build of commonMain, so
# compiling and testing it exercises the whole engine without the flakiness of
# spinning up all 25 KMP targets in CI. The oracle tests need mutool (mupdf-tools)
# to actually run their differential checks — otherwise they report as SKIPPED.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install mupdf-tools (oracle for differential tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y mupdf-tools

      - name: Compile commonMain (JVM)
        run: ./gradlew :kitepdf:compileKotlinJvm --stacktrace

      - name: Test :kitepdf (JVM)
        run: ./gradlew :kitepdf:jvmTest --stacktrace

      - name: Test :kitepdf-native-renderer (JVM oracle tests)
        run: ./gradlew :kitepdf-native-renderer:jvmTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore
